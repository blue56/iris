name: Publish Iris.Plugins.Contracts

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the package to NuGet.org
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'iris-plugins-contracts-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Iris

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Iris.Plugins.Contracts/Iris.Plugins.Contracts.csproj

      - name: Build
        run: dotnet build Iris.Plugins.Contracts/Iris.Plugins.Contracts.csproj --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack Iris.Plugins.Contracts/Iris.Plugins.Contracts.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Iris.Plugins.Contracts-package
          path: Iris/artifacts/*.nupkg

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/iris-plugins-contracts-v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
