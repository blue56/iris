# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT: Iris/Iris/Iris.csproj
  MQTT_PROJECT: Iris/Iris.Plugins.MQTT/Iris.Plugins.MQTT.csproj

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT }}
    - name: Build
      run: dotnet build ${{ env.PROJECT }} --no-restore
    - name: Test
      run: dotnet test ${{ env.PROJECT }} --no-build --verbosity normal

  publish:

    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            artifact: iris-linux-x64
          - rid: win-x64
            artifact: iris-win-x64
          - rid: osx-x64
            artifact: iris-osx-x64

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Publish ${{ matrix.rid }}
      run: >
        dotnet publish ${{ env.PROJECT }}
        --configuration Release
        --runtime ${{ matrix.rid }}
        --self-contained true
        -p:PublishSingleFile=true
        -p:DebugType=none
        --output publish/${{ matrix.rid }}
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: publish/${{ matrix.rid }}

  publish-mqtt-plugin:

    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore
      run: |
        dotnet restore ${{ env.PROJECT }}
        dotnet restore ${{ env.MQTT_PROJECT }}
    - name: Build Iris (Release)
      run: dotnet build ${{ env.PROJECT }} --configuration Release --no-restore -p:DebugType=none
    - name: Build Iris.Plugins.MQTT (Release)
      run: dotnet build ${{ env.MQTT_PROJECT }} --configuration Release --no-restore -p:ContinuousIntegrationBuild=true
    - name: Zip MQTT plugin
      run: Compress-Archive -Path Iris/Iris/bin/Release/net9.0/packages/Iris.Plugins.MQTT -DestinationPath iris-mqtt-plugin.zip
    - name: Upload MQTT plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: iris-mqtt-plugin
        path: iris-mqtt-plugin.zip
        if-no-files-found: error

  release:

    needs: [publish, publish-mqtt-plugin]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Zip binaries
      run: |
        cd artifacts
        for dir in */; do
          zip -r "${dir%/}.zip" "$dir"
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.zip
        generate_release_notes: true
