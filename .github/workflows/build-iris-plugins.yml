name: Build Iris.Plugins

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/build-iris-plugins.yml'
      - 'Iris/Iris.sln'
      - 'Iris/Iris.Plugins/**'
      - 'Iris/Iris.Core/**'
      - 'Iris/Iris.Plugins.Contracts/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/build-iris-plugins.yml'
      - 'Iris/Iris.sln'
      - 'Iris/Iris.Plugins/**'
      - 'Iris/Iris.Core/**'
      - 'Iris/Iris.Plugins.Contracts/**'

jobs:
  build-plugin:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      RUNTIME_IDENTIFIER: win-x64
      ARTIFACT_NAME: Iris.Plugins-win-x64-self-contained
    defaults:
      run:
        working-directory: Iris

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Iris.Plugins/Iris.Plugins.csproj --runtime ${{ env.RUNTIME_IDENTIFIER }}

      - name: Publish self-contained plugin
        run: >
          dotnet publish Iris.Plugins/Iris.Plugins.csproj
          --configuration Release
          --runtime ${{ env.RUNTIME_IDENTIFIER }}
          --self-contained true
          --no-restore
          --output artifacts/${{ env.ARTIFACT_NAME }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: Iris/artifacts/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
